# Nginx config baked into the frontend container.
# Caddy handles TLS + external routing; this just serves the SPA internally.

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  application/javascript
  application/json
  text/css
  text/javascript
  image/svg+xml
  font/ttf
  font/otf;

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets: cache forever, immutable.
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — Vue Router handles client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
