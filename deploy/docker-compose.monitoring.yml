# Monitoring stack for the PriceCtrl VPS.
# Independent lifecycle from the app — bring up/down without touching traffic.
#
# Server layout:
#   ~/pricectrl/
#     docker-compose.monitoring.yml   (this file)
#     .env.monitoring                 (holds BESZEL_KEY — see first-run step 3)
#     monitoring/
#       beszel_data/                  (hub SQLite + config, auto-created)
#       beszel_agent_data/            (agent state, auto-created)
#       portainer_data/               (portainer DB, auto-created)
#
# Access via Caddy reverse-proxy on subdomains (see Caddyfile):
#   monitor.pricectrl.com     → Beszel hub
#   logs.pricectrl.com        → Dozzle
#   containers.pricectrl.com  → Portainer
# All protected by basicauth at the Caddy layer + TLS via Let's Encrypt.
#
# Host ports (8090 / 8081 / 9000) are ALSO bound to 127.0.0.1 only — useful for
# SSH-tunnel access and as a failover path. Hetzner cloud firewall keeps them
# unreachable from the internet.
#
# Commands:
#   docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml up -d
#   docker compose -f docker-compose.monitoring.yml down
#   docker compose -f docker-compose.monitoring.yml logs -f <service>
#
# First-run checklist:
#   1. mkdir -p ~/pricectrl/monitoring/{beszel_data,beszel_agent_data,portainer_data}
#   2. Start hub only:
#        docker compose -f docker-compose.monitoring.yml up -d beszel-hub
#      Open https://monitor.pricectrl.com (after DNS + Caddy live) or via tunnel
#      → create admin → Add System → host: host.docker.internal, port: 45876
#      → copy the PUBLIC KEY
#   3. Create ~/pricectrl/.env.monitoring:
#        BESZEL_KEY=ssh-ed25519 AAAA... (paste hub key)
#   4. Start remaining services:
#        docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml up -d
#   5. Portainer first visit: set admin password fast (first visitor wins — but
#      Caddy basicauth already gates access, so safe).

services:
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"  # localhost-only; Caddy proxies publicly
    volumes:
      - ./monitoring/beszel_data:/beszel_data
    extra_hosts:
      # Lets hub reach agent running in host network mode on same VPS
      - "host.docker.internal:host-gateway"
    networks: [monitoring, web]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    # Host network = accurate host-level CPU / network / disk metrics.
    # Agent listens on 45876; hub connects to it via host.docker.internal:45876.
    network_mode: host
    volumes:
      - ./monitoring/beszel_agent_data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LISTEN=45876
      - KEY=${BESZEL_KEY}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
    networks: [monitoring, web]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    # Use HTTP (9000) internally; Caddy terminates TLS. Avoids self-signed cert
    # hassle when proxying. --http-enabled flag required since Portainer 2.19.
    command: --http-enabled
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/portainer_data:/data
    networks: [monitoring, web]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  monitoring:
    driver: bridge
  # Shared with the app compose so Caddy can reverse-proxy by container name.
  # Docker compose prefixes with project dir → external name is "pricectrl_web".
  web:
    name: pricectrl_web
    external: true
